<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart Web App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Responsive Shopping Cart</h1>
        <nav>
            <a href="#register">Register</a>
            <a href="#login">Login</a>
            <a href="#catalog">Catalog</a>
            <a href="#cart">Cart</a>
        </nav>
    </header>

    <main>

        <section id="register" class="card">
            <h2>User Registration</h2>
            <form id="regForm">
                <input type="text" id="regName" placeholder="Full Name" required>
                <input type="email" id="regEmail" placeholder="Email Address" required>
                <input type="password" id="regPass" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
            <p id="regMsg" class="error"></p>
        </section>


        <section id="catalog">
            <h2>Product Catalog</h2>
            <div class="grid-container">
                <div class="product-card">
                    <img src="https://via.placeholder.com/150" alt="Product 1">
                    <h3>Item 1</h3>
                    <p>$10.00</p>
                    <button class="add-btn">Add to Cart</button>
                </div>
                <div class="product-card">
                    <img src="https://via.placeholder.com/150" alt="Product 2">
                    <h3>Item 2</h3>
                    <p>$20.00</p>
                    <button class="add-btn">Add to Cart</button>
                </div>
                <div class="product-card">
                    <img src="https://via.placeholder.com/150" alt="Product 3">
                    <h3>Item 3</h3>
                    <p>$15.00</p>
                    <button class="add-btn">Add to Cart</button>
                </div>
                <div class="product-card">
                    <img src="https://via.placeholder.com/150" alt="Product 4">
                    <h3>Item 4</h3>
                    <p>$25.00</p>
                    <button class="add-btn">Add to Cart</button>
                </div>
            </div>
        </section>


        <section id="cart" class="card">
            <h2>Your Cart</h2>
            <ul id="cartItems">
                <li>Your cart is empty.</li>
            </ul>
            <div class="cart-total">Total: $<span id="totalPrice">0</span></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Web Development Lab</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
