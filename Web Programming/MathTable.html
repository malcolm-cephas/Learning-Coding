<!DOCTYPE html>
<html>
<head><title>Squares and Cubes (Exp 41)</title></head>
<body>
    <h1>Math Table (0-10)</h1>
    <table border="1" cellpadding="5">
        <tr><th>Number</th><th>Square</th><th>Cube</th></tr>
    <script>
        for(let i=0; i<=10; i++) {
            document.write(`<tr><td>${i}</td><td>${i*i}</td><td>${i*i*i}</td></tr>`);
        }
    </script>
    </table>
</body>
</html>
