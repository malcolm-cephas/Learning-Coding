<!DOCTYPE html>
<html>
<head><title>Login & Registration</title></head>
<body>
    <h2>User Login</h2>
    <form name="loginForm" onsubmit="return validateLogin()">
        ID: <input type="text" id="uid"><br>
        Pass: <input type="password" id="upass"><br>
        <input type="submit" value="Login">
    </form>

    <hr>

    <h2>Registration</h2>
    <form name="regForm" onsubmit="return validateReg()">
        Full Name: <input type="text" id="fname"><br>
        Email: <input type="email" id="uemail"><br>
        <input type="submit" value="Register">
    </form>

    <script>
        function validateLogin() {
            if(document.getElementById('uid').value == "" || document.getElementById('upass').value == "") {
                alert("Login info missing!"); return false;
            }
        }
        function validateReg() {
            if(document.getElementById('fname').value == "" || document.getElementById('uemail').value == "") {
                alert("Reg info missing!"); return false;
            }
        }
    </script>
</body>
</html>
