<!DOCTYPE html>
<html>
<head>
    <style>
        li {
            display: inline;
            border: medium double black;
            list-style-type: none;
            margin: 5px;
            padding: 10px 20px 10px 20px;
        }
        .custom-list { list-style-image: url('logo.png'); }
    </style>
</head>
<body>
    <h1>List Style Demo</h1>
    <ul>
        <li>Home</li><li>About</li><li>Contact</li>
    </ul>
    <ul class="custom-list">
        <li>User Defined Image Bullet</li>
    </ul>
</body>
</html>
