<!DOCTYPE html>
<html>
<head>
    <title>CSS Advanced (Exp 34)</title>
    <style>
        body { font-family: 'Verdana', sans-serif; background-color: #f4f4f4; color: #333; }
        .bg-element { background-color: #ffd700; border: 1px solid #000; padding: 20px; text-align: center; }
        a:link { color: blue; text-decoration: none; }
        a:hover { color: red; text-decoration: underline; }
        a:visited { color: purple; }
    </style>
</head>
<body>
    <div class="bg-element">This container has a specific background style and custom fonts.</div>
    <p><a href="#">Demo Link (Hover to see change)</a></p>
</body>
</html>
