<!DOCTYPE html>
<html>
<head>
    <style>
        .table-layout { display: table; width: 100%; border: 1px solid #ccc; }
        .row { display: table-row; }
        .cell { display: table-cell; border: 1px solid #ddd; padding: 15px; }
        .header { background-color: #eee; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Tabular Layout with CSS</h1>
    <div class="table-layout">
        <div class="row header">
            <div class="cell">Header 1</div><div class="cell">Header 2</div>
        </div>
        <div class="row">
            <div class="cell">Data 1</div><div class="cell">Data 2</div>
        </div>
    </div>
</body>
</html>
