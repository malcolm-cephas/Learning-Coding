<!DOCTYPE html>
<html>
<head><title>Number Adder</title></head>
<body>
    <h1>Number Summation (Exp 4)</h1>
    <label>Num 1:</label> <input type="number" id="n1"><br>
    <label>Num 2:</label> <input type="number" id="n2"><br>
    <label>Result:</label> <input type="text" id="res" readonly><br><br>
    <button onclick="sum()">Add Numbers</button>

    <script>
        function sum() {
            let a = parseFloat(document.getElementById('n1').value);
            let b = parseFloat(document.getElementById('n2').value);
            let r = a + b;
            document.getElementById('res').value = isNaN(r) ? "Invalid" : r;
        }
    </script>
</body>
</html>
