<!DOCTYPE html>
<html>
<head><title>Odd Number Counter</title></head>
<body>
    <h1>Odd Numbers Counter (Exp 5)</h1>
    <label>Enter a number (N):</label> <input type="number" id="num"><br>
    <button onclick="count()">Count Odds</button>
    <div id="output"></div>

    <script>
        function count() {
            let n = parseInt(document.getElementById('num').value);
            let res = "Result: ";
            for (let i = 1; i <= n; i++) {
                if (i % 2 !== 0) res += i + " ";
            }
            document.getElementById('output').innerHTML = res;
        }
    </script>
</body>
</html>
